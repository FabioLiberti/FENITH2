name: Link Checker

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/mlc_config.json'

  check-submodules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify submodule URLs are reachable
        run: |
          echo "Checking submodule URLs..."
          FAILED=0
          while IFS= read -r url; do
            if curl -s -o /dev/null -w "%{http_code}" "$url" | grep -q "200\|301\|302"; then
              echo "  OK: $url"
            else
              echo "  FAIL: $url"
              FAILED=1
            fi
          done < <(git config --file .gitmodules --get-regexp url | awk '{print $2}')
          if [ "$FAILED" -eq 1 ]; then
            echo "Some submodule URLs are not reachable."
            exit 1
          fi
          echo "All submodule URLs are reachable."
